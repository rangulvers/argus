<style>
/* ── Design tokens ── */
:root {
  --bg-0:        oklch(0.16 0.012 250);
  --bg-1:        oklch(0.19 0.013 250);
  --bg-2:        oklch(0.22 0.014 250);
  --bg-3:        oklch(0.26 0.016 250);
  --line:        oklch(0.30 0.014 250);
  --line-soft:   oklch(0.25 0.012 250);
  --line-strong: oklch(0.40 0.018 250);

  --text:   oklch(0.97 0.005 250);
  --text-2: oklch(0.78 0.010 250);
  --text-3: oklch(0.62 0.012 250);
  --text-4: oklch(0.50 0.014 250);

  --accent:      oklch(0.78 0.16 215);
  --accent-2:    oklch(0.68 0.18 215);
  --accent-bg:   oklch(0.30 0.06 215);
  --accent-glow: oklch(0.78 0.16 215 / 0.25);

  --ok:      oklch(0.78 0.14 155);
  --warn:    oklch(0.82 0.14 80);
  --crit:    oklch(0.72 0.18 25);
  --info:    oklch(0.78 0.14 250);

  --ok-bg:   oklch(0.30 0.06 155);
  --warn-bg: oklch(0.30 0.06 80);
  --crit-bg: oklch(0.30 0.08 25);
  --info-bg: oklch(0.30 0.06 250);

  --font-sans: "Inter Tight","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono: "JetBrains Mono","SF Mono",ui-monospace,monospace;

  --r-1: 6px; --r-2: 10px; --r-3: 14px; --r-4: 18px;

  --shadow-1: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 1px 2px oklch(0 0 0 / 0.4);
  --shadow-2: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 8px 24px oklch(0 0 0 / 0.4);
}

[data-theme="light"] {
  --bg-0:        oklch(0.985 0.003 250);
  --bg-1:        #ffffff;
  --bg-2:        oklch(0.97 0.005 250);
  --bg-3:        oklch(0.94 0.006 250);
  --line:        oklch(0.90 0.008 250);
  --line-soft:   oklch(0.94 0.006 250);
  --line-strong: oklch(0.80 0.010 250);

  --text:   oklch(0.20 0.012 250);
  --text-2: oklch(0.38 0.014 250);
  --text-3: oklch(0.52 0.014 250);
  --text-4: oklch(0.65 0.012 250);

  --accent:      oklch(0.55 0.18 215);
  --accent-2:    oklch(0.48 0.20 215);
  --accent-bg:   oklch(0.94 0.04 215);
  --accent-glow: oklch(0.55 0.18 215 / 0.20);

  --ok:   oklch(0.50 0.14 155);
  --warn: oklch(0.60 0.14 80);
  --crit: oklch(0.55 0.20 25);
  --info: oklch(0.55 0.14 250);

  --ok-bg:   oklch(0.94 0.04 155);
  --warn-bg: oklch(0.94 0.05 80);
  --crit-bg: oklch(0.94 0.05 25);
  --info-bg: oklch(0.94 0.04 250);

  --shadow-1: 0 1px 0 oklch(0 0 0 / 0.02), 0 1px 2px oklch(0 0 0 / 0.05);
  --shadow-2: 0 1px 2px oklch(0 0 0 / 0.04), 0 12px 32px oklch(0 0 0 / 0.06);
}

/* ── Reset + base ── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-0);
  color: var(--text);
  font-feature-settings: "ss01","cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
::selection { background: var(--accent-glow); color: var(--text); }

/* ── Utilities ── */
.mono  { font-family: var(--font-mono); font-feature-settings: "zero","ss01"; }
.tnum  { font-variant-numeric: tabular-nums; }
.eyebrow {
  font: 500 11px/1 var(--font-sans);
  color: var(--accent);
  letter-spacing: .12em;
  text-transform: uppercase;
}
a { color: var(--accent); }
h1, h2, h3 { letter-spacing: -0.025em; margin: 0; }

/* ── Layout ── */
.wrap { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--r-2);
  background: var(--bg-2); color: var(--text);
  border: 1px solid var(--line);
  font: 500 13px/1 var(--font-sans);
  cursor: pointer; transition: 120ms ease;
  text-decoration: none;
}
.btn:hover { background: var(--bg-3); border-color: var(--line-strong); color: var(--text); }
.btn-primary {
  background: var(--accent);
  color: oklch(0.15 0.02 250);
  border-color: transparent;
  box-shadow: 0 0 0 1px var(--accent-2) inset, 0 6px 16px var(--accent-glow);
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-2); color: oklch(0.15 0.02 250); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--bg-2); color: var(--text); }

/* ── Cards ── */
.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-1);
}

/* ── Chips ── */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px; border-radius: 999px;
  background: var(--bg-2); color: var(--text-2);
  border: 1px solid var(--line);
  font: 500 11px/1.4 var(--font-sans);
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* ── Status tones ── */
.tone-ok   { color: var(--ok);   background: var(--ok-bg);   border-color: color-mix(in oklch, var(--ok)   30%, transparent); }
.tone-warn { color: var(--warn); background: var(--warn-bg); border-color: color-mix(in oklch, var(--warn) 30%, transparent); }
.tone-crit { color: var(--crit); background: var(--crit-bg); border-color: color-mix(in oklch, var(--crit) 30%, transparent); }
.tone-info { color: var(--info); background: var(--info-bg); border-color: color-mix(in oklch, var(--info) 30%, transparent); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: var(--line-strong); }
::-webkit-scrollbar-track { background: transparent; }

/* ── Grid texture ── */
.bg-grid {
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 56px 56px;
  background-position: -1px -1px;
}

/* ── Animations ── */
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.6); } }

.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor; flex-shrink: 0;
}
.live-dot.pulsing { animation: pulse-dot 1.6s ease-in-out infinite; }

/* ── Nav ── */
.nav-link {

.nav-link:hover { color: var(--text); }

/* ── Chart: Spark ── */
function Spark({ data, w = 120, h = 28, stroke = "currentColor", fill = "currentColor", area = false }) {
  if (!data?.length) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const stepX = w / (data.length - 1 || 1);
  const pts = data.map((v, i) => [i * stepX, h - ((v - min) / range) * (h - 4) - 2]);
  const d = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const areaD = area ? `${d} L ${w},${h} L 0,${h} Z` : null;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block", width: "100%", height: "auto" }}>
      {area && <path d={areaD} fill={fill} fillOpacity="0.12" />}
      <path d={d} stroke={stroke} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

/* ── Chart: Donut ── */
function Donut({ segments, size = 140, thickness = 18, label, sub }) {
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  const r = (size - thickness) / 2;
  const c = 2 * Math.PI * r;
  let acc = 0;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} stroke="var(--bg-3)" strokeWidth={thickness} fill="none" />
        {segments.map((seg, i) => {
          const len = (seg.value / total) * c;
          const offset = c - acc;
          acc += len;
          return (
            <circle key={i} cx={size/2} cy={size/2} r={r}
              stroke={seg.color} strokeWidth={thickness} fill="none"
              strokeDasharray={`${len} ${c - len}`}
              strokeDashoffset={offset} strokeLinecap="butt" />
          );
        })}
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center" }}>
        <div>
          <div style={{ font: "600 22px/1 var(--font-sans)", letterSpacing: "-0.02em" }}>{label}</div>
          {sub && <div style={{ font: "500 10px/1.4 var(--font-sans)", color: "var(--text-3)", marginTop: 4 }}>{sub}</div>}
        </div>
      </div>
    </div>
  );
}

        <circle cx="50" cy="35" r="32" fill="url(#rg)"/>
        <g transform={`rotate(${sweepAngle} 50 35)`} style={{ mixBlendMode: "screen" }}>
          <path d="M 50 35 L 82 35 A 32 32 0 0 0 78 19 Z" fill="url(#sg)" opacity="0.7"/>
        </g>
        <circle cx="50" cy="35" r="2.2" fill="var(--accent)"/>

          opacity={0.6 + 0.4 * Math.sin(t * 0.1)}/>
        {blips.map((b, i) => {
          if (t < b.appearAt) return null;
          const sinceAppear = t - b.appearAt;
          const opacity = sinceAppear < 6 ? sinceAppear / 6 : 1;
          const isNewish = sinceAppear < 14;
          const cx = 12 + (b.x / 100) * 76;
          const cy = 6  + (b.y / 100) * 58;

          return (
            <g key={i} opacity={opacity}>
              <line x1="50" y1="35" x2={cx} y2={cy} stroke={color} strokeWidth="0.08" opacity="0.4"/>

                <circle cx={cx} cy={cy} r={1 + sinceAppear * 0.4} fill="none" stroke={color}
                  strokeWidth="0.15" opacity={1 - sinceAppear / 14}/>
              )}
              <circle cx={cx} cy={cy} r="1"   fill={color}/>
              <circle cx={cx} cy={cy} r="1.6" fill="none" stroke={color} strokeWidth="0.1" opacity="0.6"/>

      {blips.map((b, i) => {

            top:  `${(6 + (b.y/100) * 58) / 70 * 100}%`,

              {b.isNew && <span style={{ width: 4, height: 4, borderRadius: "50%", background: "var(--warn)" }}/>}

          </div>

      })}

        <div style={{ width: 1, height: 32, background: "var(--line)" }}/>
        <div>
          <div style={{ font: "500 9px/1 var(--font-sans)", color: "var(--text-4)", letterSpacing: ".06em", textTransform: "uppercase" }}>Subnet</div>
          <div className="mono" style={{ font: "500 12px/1 var(--font-mono)", marginTop: 6 }}>192.168.1.0/24</div>
        </div>
        <div style={{ width: 1, height: 32, background: "var(--line)" }}/>

          <div style={{ font: "500 9px/1 var(--font-sans)", color: "var(--text-4)", letterSpacing: ".06em", textTransform: "uppercase" }}>Phase</div>
          <div className="mono" style={{ font: "500 12px/1 var(--font-mono)", marginTop: 6, color: "var(--accent)" }}>port-scan</div>
        </div>
      </div>

      {/* Live badge */}
      <div style={{
        position: "absolute", top: 16, left: 16,

        padding: "6px 12px", borderRadius: 999,

/* ── Theme toggle ── */
function ThemeToggle() {
  const [dark, setDark] = useState(true);
  const toggle = () => {
    const next = !dark;
    setDark(next);
    document.documentElement.setAttribute("data-theme", next ? "dark" : "light");
  };
  return (
    <button onClick={toggle} className="btn btn-ghost" style={{ padding: "6px 8px", lineHeight: 0 }}
      aria-label="Toggle theme">
      {dark ? I.sun : I.moon}
    </button>
  );
}

/* ── Navigation ── */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <header style={{
      position: "sticky", top: 0, zIndex: 50,
      background: scrolled
        ? "color-mix(in oklch, var(--bg-0) 88%, transparent)"
        : "color-mix(in oklch, var(--bg-0) 60%, transparent)",
      backdropFilter: "blur(12px)",
      borderBottom: scrolled ? "1px solid var(--line-soft)" : "1px solid transparent",
      transition: "background 200ms, border-color 200ms",
    }}>
      <div className="wrap" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 32px" }}>
        <a href="#" style={{ display: "flex", alignItems: "center", gap: 10, color: "var(--text)", textDecoration: "none" }}>
          <span style={{ color: "var(--accent)" }}><ArgusLogo size={28}/></span>
          <span style={{ font: "700 16px/1 var(--font-sans)", letterSpacing: ".06em" }}>ARGUS</span>

        <nav className="nav-links" style={{ display: "flex", gap: 26 }}>

            <a key={h} className="nav-link" href={h}>{t}</a>

/* ── Copy button ── */
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button onClick={copy} className="btn btn-ghost" style={{ padding: "4px 8px", font: "500 11px/1 var(--font-sans)", gap: 5 }}>
      {copied ? I.check : I.copy} {copied ? "Copied" : "Copy"}
    </button>
  );
}

function HowItWorks() {
  const steps = [
    { n: "01", title: "Discovery",    body: "ARP scan + ping sweep walks every IP in your subnet. Nothing fancy — just thorough." },
    { n: "02", title: "Fingerprint",  body: "Vendor (MAC OUI), OS (nmap -O), and services from version banners. Cross-checked against your DHCP lease tables." },
    { n: "03", title: "Enrich",       body: "Pulls metadata from UniFi (switch port, VLAN), Pi-hole/AdGuard (DNS patterns), and the NIST CVE database." },
    { n: "04", title: "Diff",         body: "Each scan is stored. The next scan compares and surfaces only what changed — new MACs, new ports, new vulns." },
    { n: "05", title: "Notify",       body: "Optional webhook sends a digest to Discord, Slack, ntfy, or your inbox. Or just check the dashboard once a week." },
  ];
  return (
    <section style={{ paddingTop: 100, paddingBottom: 100, borderTop: "1px solid var(--line-soft)" }}>
      <div className="wrap">
        <div style={{ maxWidth: 720, marginBottom: 56 }}>
          <div className="eyebrow" style={{ marginBottom: 14 }}>How it works</div>
          <h2 style={{ font: "700 44px/1.05 var(--font-sans)", marginBottom: 18, textWrap: "balance" }}>
            Five steps. Sixty-five thousand ports.
          </h2>
        </div>
        <div className="hiw-grid" style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 14 }}>
          {steps.map((s, i) => (
            <div key={i} className="card" style={{ padding: 22, position: "relative" }}>
              <div className="mono" style={{ font: "600 12px/1 var(--font-mono)", color: "var(--accent)", marginBottom: 16, letterSpacing: ".08em" }}>{s.n}</div>
              <div style={{ font: "600 16px/1.2 var(--font-sans)", marginBottom: 10 }}>{s.title}</div>
              <div style={{ font: "500 12.5px/1.55 var(--font-sans)", color: "var(--text-3)" }}>{s.body}</div>
              {i < steps.length - 1 && (
                <div style={{ position: "absolute", right: -10, top: 36, color: "var(--text-4)", zIndex: 1 }}>{I.chevron}</div>
              )}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ── Docs ── */
const COMPOSE_YAML = `services:
  argus:
    image: ghcr.io/rangulvers/argus:latest
    network_mode: host
    volumes: [argus_data:/data]
    environment:
      SUBNET: 192.168.1.0/24
      UNIFI_URL: https://unifi.lan:8443
      UNIFI_API_KEY: \${UNIFI_API_KEY}
      PIHOLE_URL: http://pihole.lan
volumes:
  argus_data: {}`;

const ENV_TABLE = [
  ["SUBNET",      "CIDR(s) to sweep, comma-separated", "required"],
  ["SCAN_CRON",   "Cron expression",                   "0 14 * * *"],
  ["NMAP_ARGS",   "Override scan flags",               "-sS -O -p1-65535"],
  ["UNIFI_URL",   "UniFi controller URL",              "optional"],
  ["PIHOLE_URL",  "Pi-hole admin URL",                 "optional"],
  ["ADGUARD_URL", "AdGuard Home URL",                  "optional"],
  ["WEBHOOK_URL", "Notification destination",          "optional"],
];

/* ── FAQ ── */
function FAQ() {
  const [open, setOpen] = useState(null);
  const items = [
    ["Does ARGUS phone home?",
     "No. Zero outbound calls except the ones you configure (CVE database refresh and your optional webhook). All scan data stays in your SQLite file."],
    ["Will it slow my network down?",
     "An nmap port scan of a /24 takes 2–5 minutes and uses bandwidth comparable to a single Netflix client during that window. Schedule it for off-hours if you're paranoid."],
    ["Why nmap and not pure Python sockets?",
     "nmap is twenty-five years of tuned heuristics. We don't reinvent that. ARGUS is the layer above — orchestration, persistence, correlation, UI."],
    ["Does it support IPv6?",
     "Yes. Set SUBNET to your IPv6 prefix or pass both as a comma-separated list."],
    ["Can I run multiple ARGUS instances?",
     "Yes — one per VLAN/site. They don't talk to each other (yet). A federation mode is on the roadmap."],
    ["Is this a security tool?",
     "It's a homelab tool that surfaces security signals. It is not a SIEM, not an IDS, and won't stop an attacker. It will tell you when something new joined your network at 3am."],
  ];
  return (
    <section id="faq" style={{ paddingTop: 100, paddingBottom: 100, borderTop: "1px solid var(--line-soft)" }}>
      <div className="wrap" style={{ maxWidth: 880 }}>
        <div className="eyebrow" style={{ marginBottom: 14 }}>FAQ</div>
        <h2 style={{ font: "700 44px/1.05 var(--font-sans)", marginBottom: 36 }}>Things people ask.</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {items.map(([q, a], i) => (
            <div key={i} className="card" style={{ overflow: "hidden", cursor: "pointer" }} onClick={() => setOpen(open === i ? null : i)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 22px" }}>
                <span style={{ font: "600 15px/1.3 var(--font-sans)" }}>{q}</span>
                <span style={{ color: "var(--text-3)", transform: open === i ? "rotate(180deg)" : "none", transition: "transform 200ms", flexShrink: 0, marginLeft: 16 }}>{I.chevronDown}</span>
              </div>
              {open === i && (
                <div style={{ font: "500 14px/1.6 var(--font-sans)", color: "var(--text-2)", padding: "0 22px 18px" }}>
                  {a}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ── CTA ── */
function CTA() {
  return (
    <section style={{ paddingTop: 100, paddingBottom: 100, borderTop: "1px solid var(--line-soft)" }}>
      <div className="wrap">
        <div className="card" style={{
          padding: 56, textAlign: "center", overflow: "hidden", position: "relative",
          background: "radial-gradient(120% 80% at 50% 0%, color-mix(in oklch, var(--accent) 18%, var(--bg-1)) 0%, var(--bg-1) 70%)",
        }}>
          <div style={{ position: "absolute", inset: 0, opacity: 0.4 }} className="bg-grid"/>
          <div style={{ position: "relative" }}>
            <span style={{ display: "inline-flex", color: "var(--accent)", marginBottom: 22 }}><ArgusLogo size={56}/></span>
            <h2 style={{ font: "700 44px/1.05 var(--font-sans)", marginBottom: 18, textWrap: "balance" }}>
              Stop wondering what's on your network.
            </h2>
            <p style={{ font: "500 17px/1.55 var(--font-sans)", color: "var(--text-2)", maxWidth: 560, margin: "0 auto 28px" }}>
              ARGUS runs on the cheapest Pi you have. Free, open source, MIT licensed.
              Five minutes to install. Every minute after that, on watch.
            </p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <a className="btn btn-primary" href="https://github.com/rangulvers/argus" style={{ padding: "12px 18px" }}>{I.github} View on GitHub</a>
              <a className="btn" href="#install" style={{ padding: "12px 18px" }}>{I.terminal} Get started</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── Footer ── */
function Footer() {
  return (
    <footer style={{ paddingTop: 40, paddingBottom: 40, borderTop: "1px solid var(--line-soft)" }}>
      <div className="wrap" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ color: "var(--accent)" }}><ArgusLogo size={22}/></span>
          <span className="mono" style={{ font: "500 12px/1 var(--font-mono)", color: "var(--text-3)" }}>
            argus · MIT · made for homelabs
          </span>
        </div>
        <div style={{ display: "flex", gap: 22, font: "500 12px/1 var(--font-sans)", flexWrap: "wrap" }}>
          <a className="nav-link" href="https://github.com/rangulvers/argus">GitHub</a>
          <a className="nav-link" href="https://github.com/rangulvers/argus/issues">Issues</a>
          <a className="nav-link" href="https://github.com/rangulvers/argus/releases">Releases</a>
          <a className="nav-link" href="https://github.com/rangulvers/argus/blob/main/docker-compose.yml">Compose example</a>
        </div>
      </div>
    </footer>
  );
}

/* ── Root ── */
function Landing() {
  return (
    <div>
      <Nav/>
      <Hero/>
      <Features/>
      <Integrations/>
      <Screenshots/>
      <HowItWorks/>
      <Docs/>
      <FAQ/>
      <CTA/>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Landing/>);
</script>
</body>
</html>
