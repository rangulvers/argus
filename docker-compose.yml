version: '3.8'

services:
  argus:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/rangulvers/argus:latest

    # OR build from local source (uncomment the line below and comment out 'image' above)
    # build: .

    container_name: argus

    # Network configuration - use host network for nmap scanning
    # Host networking is required so nmap can reach all devices on the local network.
    network_mode: host

    # Capabilities required for nmap
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Privileged mode (alternative to cap_add if needed)
    # privileged: true

    # Load secrets from .env file (copy .env.example to .env and fill in values)
    env_file:
      - .env

    # Environment variables
    environment:
      - DATABASE_URL=sqlite:///./data/argus.db
      - PYTHONUNBUFFERED=1

    # Restart policy
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

    # Volumes
    # Host networking is required for nmap; data and config are mounted as volumes
    # so they persist across container restarts and can be edited without rebuilding.
    volumes:
      - ./data:/app/data              # Database storage
      - ./config.yaml:/app/config.yaml  # Configuration (read-write for schedule updates)
      - ./logs:/var/log                # Logs

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
